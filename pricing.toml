# pool-coder pricing table — USD per 1,000,000 tokens. EDIT FREELY.
#
# Base input/output are Anthropic list prices. Cache rates use the standard
# prompt-caching multipliers: cache_write ~= 1.25x input (5-minute cache),
# cache_read ~= 0.1x input. Claude Code mixes 5m/1h caches, so the cost figure
# is an estimate, not a bill. Point the CLI at this file with `--pricing`.

[default]
input = 5.0
output = 25.0
cache_write = 6.25
cache_read = 0.5

